<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Repolyze — Know your code better.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.10">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200" stroke="#94a3b8" stroke-width="1"/>
    <path d="M100 0V630M200 0V630M300 0V630M400 0V630M500 0V630M600 0V630M700 0V630M800 0V630M900 0V630M1000 0V630M1100 0V630" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- terminal card -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="980" height="390" rx="18" fill="#0b1220" stroke="#1f2937" stroke-width="2"/>
    <rect x="110" y="120" width="980" height="62" rx="18" fill="#111827"/>
    <rect x="110" y="166" width="980" height="16" fill="#111827"/>
    <circle cx="150" cy="151" r="9" fill="#ef4444"/>
    <circle cx="178" cy="151" r="9" fill="#eab308"/>
    <circle cx="206" cy="151" r="9" fill="#22c55e"/>
    <rect x="248" y="142" width="240" height="18" rx="9" fill="#0f172a" stroke="#1f2937"/>
  </g>

  <!-- content -->
  <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">
    <text x="170" y="250" font-size="44" fill="url(#accent)" font-weight="700">Repolyze</text>
    <text x="170" y="306" font-size="40" fill="#e2e8f0" font-weight="700">Know your code better.</text>
    <text x="170" y="356" font-size="24" fill="#94a3b8">CLI/TUI for analyzing local Git repositories.</text>

    <text x="170" y="420" font-size="22" fill="#64748b">
      <tspan fill="#22c55e">$</tspan>
      <tspan dx="10" fill="#94a3b8">repolyze analyze --format json</tspan>
    </text>
    <text x="170" y="462" font-size="20" fill="#64748b">Analyzed locally. No data leaves your machine.</text>
  </g>
</svg>

